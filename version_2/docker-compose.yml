version: "3.8"

services:
  # ──────────────────────────────────────
  # InfluxDB — Time-series database
  # ──────────────────────────────────────
  # TimescaleDB — Time-series database
  # ──────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb-ha:pg14-latest
    container_name: weather_timescaledb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=adminpassword123
      - POSTGRES_DB=weather_forecast
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/home/postgres/pgdata/data
    restart: always

volumes:
  timescaledb-data:
