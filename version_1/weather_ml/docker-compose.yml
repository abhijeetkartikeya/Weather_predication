services:
  # ── InfluxDB (Time-Series Database) ──
  influxdb:
    image: influxdb:2.7
    container_name: weather_influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=weather-ml
      - DOCKER_INFLUXDB_INIT_BUCKET=weather_forecast
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=weather-ml-token-secret
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "influx", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana (Dashboard) ──
  grafana:
    image: grafana/grafana:11.3.0
    container_name: weather_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/weather_dashboard.json
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # ── ML Forecast Service ──
  ml-service:
    profiles:
      - ml-service
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather_ml_service
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=weather-ml-token-secret
      - INFLUXDB_ORG=weather-ml
      - INFLUXDB_BUCKET=weather_forecast
      - PG_HOST=${PG_HOST:-host.docker.internal}
      - PG_DATABASE=${PG_DATABASE:-weatherdb}
      - PG_USER=${PG_USER:-kartikeya}
      - PG_PASSWORD=${PG_PASSWORD:-}
    volumes:
      - ./forecast_output.csv:/app/forecast_output.csv
      - ./models:/app/models
      - ./data:/app/data:ro
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  influxdb_data:
  grafana_data:
