services:
  postgres:
    image: postgres:16
    container_name: weather_postgres_v2
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    networks:
      - weather_net_v2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: always

  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather_ml_service_v2
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    networks:
      - weather_net_v2
    depends_on:
      postgres:
        condition: service_healthy
    init: true
    volumes:
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
    stop_grace_period: 30s
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: weather_api_v2
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      API_PORT: 8001
    ports:
      - "${API_PORT:-8001}:8001"
    networks:
      - weather_net_v2
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
    restart: always

  grafana:
    image: grafana/grafana:11.4.0
    container_name: weather_grafana_v2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
      GRAFANA_POSTGRES_HOST: postgres:5432
      GRAFANA_POSTGRES_DB: ${POSTGRES_DB}
      GRAFANA_POSTGRES_USER: ${POSTGRES_USER}
      GRAFANA_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data_v2:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - weather_net_v2
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data_v2:
  grafana_data_v2:

networks:
  weather_net_v2:
    driver: bridge
